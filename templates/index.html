<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Service | Flask + MySQL</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1a1f36, #0d1117);
            color: #e6edf3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 650px;
        }

        /* Header */
        .header {
            margin-bottom: 15px;
            text-align: left;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .header p {
            font-size: 0.9rem;
            color: #8b949e;
        }

        /* Card */
        .card {
            background: #161b22;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid #30363d;
        }

        /* Messages (log style) */
        .messages {
            background: #0d1117;
            border-radius: 8px;
            padding: 15px;
            height: 220px;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid #30363d;
        }

        .messages p {
            background: #21262d;
            padding: 8px 10px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 0.9rem;
            text-align: left;
        }

        /* Input */
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #e6edf3;
            margin-bottom: 10px;
            transition: border 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: #58a6ff;
            outline: none;
        }

        /* Button */
        input[type="submit"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        input[type="submit"]:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        /* Footer note */
        .footer {
            margin-top: 10px;
            font-size: 0.75rem;
            color: #6e7681;
            text-align: center;
        }

        @media (max-width: 600px) {
            .card {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <div class="header">
            <h1>Message Service Dashboard</h1>
            <p>Flask + MySQL | Two-Tier Architecture</p>
        </div>

        <div class="card">
            <div class="messages">
                {% for message in messages %}
                    <p>{{ message[0] }}</p>
                {% endfor %}
            </div>

            <form id="messageForm">
                <input type="text" name="new_message" placeholder="Enter message..." required>
                <input type="submit" value="Submit Message">
            </form>
        </div>

        <div class="footer">
            Persistent storage enabled via Docker volumes
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $("#messageForm").on("submit", function(event) {
                event.preventDefault();

                let messageInput = $("input[name='new_message']");
                let message = messageInput.val().trim();

                if (message === "") {
                    alert("Message cannot be empty!");
                    return;
                }

                $.ajax({
                    url: "/submit",
                    type: "POST",
                    data: { new_message: message },
                    success: function(response) {
                        if (response && response.message) {
                            $(".messages").append("<p>" + response.message + "</p>");
                            messageInput.val("");
                        }
                    }
                });
            });
        });
    </script>

</body>
</html>
